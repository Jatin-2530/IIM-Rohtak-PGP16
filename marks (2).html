<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PGP16 · Term 3 Marks</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f2f5;--surface:#fff;--surface2:#f8f9fa;--border:#e4e6ea;--border2:rgba(0,0,0,.05);
  --navy:#111827;--text:#1f2937;--muted:#6b7280;--light:#9ca3af;
  --blue:#3b82f6;--blue-bg:#eff6ff;--purple:#7c3aed;--purple-bg:#f5f3ff;
  --green:#059669;--green-bg:#ecfdf5;--red:#dc2626;--red-bg:#fef2f2;
  --amber:#d97706;--amber-bg:#fffbeb;
  --gold:#c9a84c;--gold2:#e8c96a;
  --s1:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --s3:0 12px 40px rgba(0,0,0,.14);
  --r:10px;--r2:16px;
}
[data-theme="dark"]{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--border2:rgba(255,255,255,.05);
  --navy:#e6edf3;--text:#cdd9e5;--muted:#768390;--light:#545d68;
  --blue:#58a6ff;--blue-bg:#0d1f3c;--purple:#a371f7;--purple-bg:#1a1035;
  --green:#3fb950;--green-bg:#0f2415;--red:#ff7b93;--red-bg:#3d0f1a;
  --amber:#e3b341;--amber-bg:#2e1f00;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:14px;scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
/* LOADING — hidden; data fetches in background */
#loading{display:none!important;}
/* DEBUG PANEL */
#dbg{background:#0d1117;color:#58a6ff;font-family:'JetBrains Mono',monospace;font-size:.65rem;border-radius:var(--r);padding:.75rem 1rem;margin-bottom:.8rem;white-space:pre-wrap;word-break:break-all;display:none;border:1px solid #30363d;max-height:220px;overflow-y:auto;}
#dbg.show{display:block;}
.llogo-fb{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:900;color:#fff;animation:pulse 1.5s ease-in-out infinite;}
.ltitle{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--navy);margin-top:1.2rem;}
.lsub{font-size:.75rem;color:var(--muted);margin-top:.3rem;}
.lbar{width:160px;height:2px;background:var(--border);border-radius:2px;margin-top:1.1rem;overflow:hidden;}
.lfill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));animation:bar 1.8s ease-in-out infinite;}
#lpct{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--muted);margin-top:.5rem;}
/* APP */
#app{display:block;}
/* HEADER */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.6rem;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--s1);}
.hdr-l{display:flex;align-items:center;gap:.75rem;}
.hdr-logo-fb{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:.85rem;font-weight:900;color:#fff;}
.hdr-title h1{font-family:'Playfair Display',serif;font-size:.98rem;font-weight:700;color:var(--navy);}
.hdr-title p{font-size:.6rem;color:var(--muted);}
.hdr-r{display:flex;align-items:center;gap:.55rem;}
.upd{font-size:.6rem;color:var(--light);}
.ibtn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:.82rem;transition:all .15s;}
.ibtn:hover{background:var(--blue-bg);color:var(--blue);border-color:var(--blue);}
.ibtn.w{width:auto;padding:0 .75rem;font-size:.7rem;font-weight:600;}
/* STATS */
.stats{display:flex;gap:.65rem;padding:.9rem 1.6rem;flex-wrap:wrap;background:var(--surface);border-bottom:1px solid var(--border);}
.sc{flex:1;min-width:90px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:.75rem .9rem;position:relative;overflow:hidden;}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.sc:nth-child(1)::before{background:#f87171;}
.sc:nth-child(2)::before{background:var(--blue);}
.sc:nth-child(3)::before{background:var(--green);}
.sc:nth-child(4)::before{background:#a78bfa;}
.sc:nth-child(5)::before{background:#fb923c;}
.sc:nth-child(6)::before{background:#34d399;}
.sc-n{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--navy);}
.sc-l{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:.1rem;}
/* WRAP */
.wrap{padding:1.1rem 1.6rem;}
/* SEGMENTS */
.seg{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.sb{padding:.32rem .78rem;font-size:.7rem;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:none;transition:all .15s;}
.sb.on{background:var(--blue);color:#fff;}
.sb:hover:not(.on){background:var(--border2);}
/* ERROR */
.ebar{background:var(--red-bg);border:1px solid #fca5a5;border-radius:var(--r);padding:.7rem 1rem;margin-bottom:.9rem;font-size:.76rem;color:var(--red);display:none;}
/* FILTERS */
.fbar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:.8rem 1rem;margin-bottom:.9rem;display:flex;flex-wrap:wrap;gap:.55rem;align-items:flex-end;box-shadow:var(--s1);}
.fg{flex:1;min-width:110px;}
.fg label{display:block;font-size:.6rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:.28rem;}
.fg input,.fg select{width:100%;padding:.4rem .7rem;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:.76rem;outline:none;transition:border-color .15s;}
.fg input:focus,.fg select:focus{border-color:var(--blue);}
.fg select option{background:var(--surface);}
.rst{padding:.4rem .8rem;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--muted);font-size:.7rem;font-weight:600;cursor:pointer;}
.rst:hover{border-color:var(--red);color:var(--red);}
/* TABLE */
.tcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;box-shadow:var(--s1);}
.tbar{display:flex;justify-content:space-between;align-items:center;padding:.7rem 1.1rem;border-bottom:1px solid var(--border);background:var(--surface2);}
.tbar h3{font-family:'Playfair Display',serif;font-size:.88rem;color:var(--navy);}
.tcnt{font-size:.68rem;color:var(--muted);}
.tscroll{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 300px);}
table{width:100%;border-collapse:collapse;font-size:.76rem;}
thead th{padding:.55rem .78rem;background:var(--surface2);text-align:left;font-size:.59rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;position:sticky;top:0;z-index:10;box-shadow:0 1px 0 var(--border);}
thead th:hover{color:var(--navy);}
thead th.son{color:var(--blue);}
thead th.son::after{content:attr(data-d);margin-left:.22rem;font-size:.52rem;}
tbody tr{border-bottom:1px solid var(--border2);transition:background .1s;}
tbody tr:hover{background:var(--blue-bg);}
[data-theme="dark"] tbody tr:hover{background:rgba(88,166,255,.06);}
tbody tr:last-child{border-bottom:none;}
tbody td{padding:.5rem .78rem;vertical-align:middle;white-space:nowrap;}
.nores{text-align:center;padding:2.5rem;color:var(--muted);font-style:italic;font-size:.8rem;}
/* CELLS */
.nc{font-weight:600;color:var(--navy);}
.rc{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--muted);}
.mc{font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:500;color:var(--navy);}
.tgc{font-family:'Playfair Display',serif;font-weight:700;color:var(--blue);font-size:.86rem;}
.cgc{font-family:'Playfair Display',serif;font-weight:700;color:var(--green);font-size:.86rem;}
/* RANK BADGES */
.rb{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-weight:700;font-size:.7rem;font-family:'JetBrains Mono',monospace;flex-shrink:0;}
.r1{background:linear-gradient(135deg,#fde68a,#fbbf24);color:#78350f;}
.r2{background:linear-gradient(135deg,#e2e8f0,#94a3b8);color:#1e293b;}
.r3{background:linear-gradient(135deg,#fed7aa,#fb923c);color:#7c2d12;}
.ro{background:var(--surface2);color:var(--muted);font-size:.65rem;border:1px solid var(--border);}
/* GRADE CHIPS */
.gc{display:inline-block;padding:.1rem .36rem;border-radius:4px;font-size:.65rem;font-weight:700;font-family:'JetBrains Mono',monospace;}
.gAp{background:#fef9c3;color:#854d0e;border:1px solid #fde68a;}
.gA{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0;}
.gAm{background:#dbeafe;color:#1e40af;border:1px solid #93c5fd;}
.gBp{background:#ede9fe;color:#5b21b6;border:1px solid #c4b5fd;}
.gB{background:#f1f5f9;color:#475569;border:1px solid #cbd5e1;}
.gBm{background:#fff7ed;color:#9a3412;border:1px solid #fed7aa;}
.gCp{background:#fefce8;color:#713f12;border:1px solid #fde68a;}
.gC{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;}
.gCm{background:#fce7f3;color:#9d174d;border:1px solid #f9a8d4;}
.gD{background:#fef2f2;color:#7f1d1d;border:1px solid #fca5a5;}
[data-theme="dark"] .gAp{background:#3a2e00;color:#fde68a;border-color:#854d0e;}
[data-theme="dark"] .gA{background:#052e16;color:#6ee7b7;border-color:#065f46;}
[data-theme="dark"] .gAm{background:#0d1f3c;color:#93c5fd;border-color:#1e40af;}
[data-theme="dark"] .gBp{background:#1a1035;color:#c4b5fd;border-color:#5b21b6;}
[data-theme="dark"] .gB{background:#1e2535;color:#94a3b8;border-color:#475569;}
[data-theme="dark"] .gBm{background:#2a1500;color:#fed7aa;border-color:#9a3412;}
[data-theme="dark"] .gCp{background:#2e1f00;color:#fde68a;border-color:#713f12;}
[data-theme="dark"] .gC{background:#2c0f0f;color:#fca5a5;border-color:#991b1b;}
[data-theme="dark"] .gCm{background:#3d0f1a;color:#f9a8d4;border-color:#9d174d;}
/* BADGES */
.badge{display:inline-block;padding:.08rem .32rem;border-radius:4px;font-size:.61rem;font-weight:600;}
.bpgp{background:var(--blue-bg);color:var(--blue);}
.bipm{background:#fce7f3;color:#9d174d;}
[data-theme="dark"] .bipm{background:#3d0f1a;color:#f9a8d4;}
.bsec{background:var(--purple-bg);color:var(--purple);}
/* PHOTOS */
.sphoto{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid var(--border);flex-shrink:0;vertical-align:middle;}
.sphoto-fb{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:inline-flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#fff;flex-shrink:0;border:2px solid var(--border);vertical-align:middle;}
/* ASTERISK */
.asterr{color:var(--amber);font-size:.65rem;font-weight:700;vertical-align:super;cursor:help;margin-left:.1rem;}
/* COMMENT BOX */
.cbox{margin:0;padding:.65rem 1.6rem;background:linear-gradient(90deg,var(--amber-bg),var(--surface));border-bottom:1px solid #fde68a;display:none;align-items:flex-start;gap:.65rem;}
.cbox.show{display:flex;}
.cbox-icon{font-size:1rem;flex-shrink:0;margin-top:.05rem;}
.cbox-body{flex:1;}
.cbox-label{font-size:.58rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--amber);margin-bottom:.18rem;}
.cbox-text{font-size:.78rem;color:var(--text);line-height:1.55;white-space:pre-wrap;word-break:break-word;}
.cbox-close{background:none;border:none;color:var(--amber);cursor:pointer;font-size:.95rem;opacity:.55;padding:.1rem .3rem;flex-shrink:0;line-height:1;}
.cbox-close:hover{opacity:1;}
[data-theme="dark"] .cbox{background:linear-gradient(90deg,#2e1f00,var(--surface));}
/* TOAST */
.toast{position:fixed;bottom:1.4rem;right:1.4rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.68rem 1.1rem;font-size:.78rem;color:var(--text);box-shadow:var(--s3);z-index:9999;transform:translateY(70px);opacity:0;transition:all .35s cubic-bezier(.34,1.56,.64,1);}
.toast.on{transform:translateY(0);opacity:1;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes bar{0%{width:0}50%{width:70%}100%{width:100%}}
@media(max-width:640px){.hdr,.wrap,.stats{padding-left:.9rem;padding-right:.9rem;}}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="llogo-fb">IIM</div>
  <div class="ltitle">PGP16 Academic Portal</div>
  <div class="lsub">Loading Term 3 marks…</div>
  <div class="lbar"><div class="lfill"></div></div>
  <div id="lpct">0%</div>
</div>

<!-- APP -->
<div id="app">

  <div class="hdr">
    <div class="hdr-l">
      <div class="hdr-logo-fb">IIM</div>
      <div class="hdr-title">
        <h1>PGP16 Academic Portal</h1>
        <p>Term 3 &mdash; Marks, Grades &amp; Ranks &middot; Batch 2025&ndash;27</p>
      </div>
    </div>
    <div class="hdr-r">
      <span class="upd" id="upd"></span>
      <div class="ibtn" onclick="doRefresh()" title="Refresh">&#8635;</div>
      <div class="ibtn" onclick="toggleTheme()" id="tbtn">&#9790;</div>
      <div class="ibtn w" onclick="window.location.href='index.html'">&#8592; Portal</div>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <!-- COMMENT BOX — text pulled from sheet cell BC1; leave blank to hide -->
  <div class="cbox" id="cbox">
    <span class="cbox-icon">📌</span>
    <div class="cbox-body">
      <div class="cbox-label">Notice</div>
      <div class="cbox-text" id="cbox-text"></div>
    </div>
    <button class="cbox-close" onclick="document.getElementById('cbox').classList.remove('show')" title="Dismiss">✕</button>
  </div>

  <div class="wrap">
    <div id="dbg"></div>
    <div class="ebar" id="ebar"><strong>Error:</strong> <span id="emsg"></span></div>

    <!-- VIEW TOGGLE -->
    <div style="display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;margin-bottom:.85rem;">
      <div class="seg" id="vseg">
        <button class="sb on"  onclick="swView('marks',this)">Marks</button>
        <button class="sb"     onclick="swView('grades',this)">Grades</button>
        <button class="sb"     onclick="swView('ranks',this)">Subject Ranks</button>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="fbar">
      <div class="fg">
        <label>Search</label>
        <input type="text" id="fq" placeholder="Name or roll no" oninput="applyF()">
      </div>
      <div class="fg">
        <label>Programme</label>
        <select id="fprog" onchange="applyF()">
          <option value="">All</option><option value="PGP">PGP</option><option value="IPM">IPM</option>
        </select>
      </div>
      <div class="fg">
        <label>Section</label>
        <select id="fsec" onchange="applyF()">
          <option value="">All</option>
          <option>A</option><option>B</option><option>C</option><option>D</option><option>E</option>
        </select>
      </div>
      <div class="fg">
        <label>Sort By</label>
        <select id="fsortby" onchange="applyF()">
          <optgroup label="Ranking">
            <option value="ovr">Overall Rank (Year 1)</option>
            <option value="t3r">Term 3 Rank</option>
          </optgroup>
          <optgroup label="GPA">
            <option value="tg">TG (T3) highest first</option>
            <option value="cg">CG (T3) highest first</option>
          </optgroup>
          <optgroup label="Identity">
            <option value="name">Name A → Z</option>
            <option value="roll">Roll No</option>
          </optgroup>
          <optgroup label="Subject Marks (highest first)">
            <option value="m0">BRM</option><option value="m1">BE</option>
            <option value="m2">SM</option><option value="m3">OM-2</option>
            <option value="m4">HRM</option><option value="m5">LAB</option>
            <option value="m6">SBIE</option><option value="m7">FM</option>
            <option value="m8">MIS</option>
          </optgroup>
        </select>
      </div>
      <div class="fg">
        <label>Min TG</label>
        <input type="number" id="ftmin" placeholder="0.0" step="0.01" min="0" max="10" oninput="applyF()">
      </div>
      <div class="fg">
        <label>Max TG</label>
        <input type="number" id="ftmax" placeholder="10.0" step="0.01" min="0" max="10" oninput="applyF()">
      </div>
      <div class="fg">
        <label>Top N Rank</label>
        <input type="number" id="frnk" placeholder="e.g. 50" min="1" oninput="applyF()">
      </div>
      <button class="rst" onclick="resetF()">Reset</button>
    </div>

    <!-- TABLE -->
    <div class="tcard">
      <div class="tbar">
        <h3 id="ttitle">Term 3 — Marks</h3>
        <span class="tcnt" id="tcnt"></span>
      </div>
      <div class="tscroll">
        <table>
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
        <div class="nores" id="nores" style="display:none">No students match the filters.</div>
      </div>
    </div>


  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ──────────────────────────────────────────────
   COLUMN MAPPING (0-indexed, A=0)
   A=0   Roll No
   B=1   Name
   C=2   Section
   D–L   = 3–11  : other info (ignored)

   M–U   = 12–20 : Total marks per subject (9)
   AE–AM = 30–38 : Subject rank (9)
   AN–AV = 39–47 : Grade per subject (9)
   AW=48  TG (T3 TGPA)
   AX=49  T3 Rank
   AY=50  (unused)
   AZ=51  CG (CGPA T3)
   BA=52  Overall Rank (Year 1)
   BC=54  Admin comment (row 1 only) — shown in notice box
────────────────────────────────────────────── */
var SHEET_ID="11oWJ3R0qFJE86MuzcdPwhhUqQR_A-AS0byKMTXTq1NE";
// ★ REPLACE with your "Publish to web → CSV" URL (File → Share → Publish to web → .csv)
// Until then the /export URL is used as fallback — works on GitHub Pages for public sheets
var CSV_PUBLISH="https://docs.google.com/spreadsheets/d/e/2PACX-1vTmVJcZEVbZy5WqMY46jxkLaRFVTCYavarwJ1aDciYe7nTJ4zuLFM4w9JP7H446vQLmxQ_LakVtAFut/pub?gid=0&single=true&output=csv"; // paste published URL here once you have it
var CSV_EXPORT="https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/export?format=csv&gid=0";
var CSV_URL=CSV_PUBLISH||CSV_EXPORT;
var API="https://script.google.com/macros/s/AKfycby-UN3JpQNFLL9pFaXWA4epPxxYB5-gRBkuDhUzgc3Gm2sP6DOnKXcsxKD7qPbFFzDg/exec";
var SUBJECTS=["BRM","BE","SM","OM-2","HRM","LAB","SBIE","FM","MIS"];
var C={TOT:3,RANK:12,GRD:21,TG:30,T3R:31,CG:33,ORANK:34,COMMENT:35};

var allRows=[],filtered=[],photos={};
var curView="marks",sk="ovr",sd=1;

/* ── AUTH PASSTHROUGH (no re-login when coming from index.html) ── */
var curUser=null;
(function(){
  try{
    var s=localStorage.getItem("pgp16_auth");
    if(s)curUser=JSON.parse(s);
  }catch(e){}
})();

/* ── THEME ── */
(function(){var t=localStorage.getItem("theme")||"light";document.documentElement.setAttribute("data-theme",t);})();
function toggleTheme(){
  var d=document.documentElement,dk=d.getAttribute("data-theme")==="dark";
  d.setAttribute("data-theme",dk?"light":"dark");
  document.getElementById("tbtn").innerHTML=dk?"&#9790;":"&#9728;";
  localStorage.setItem("theme",dk?"light":"dark");
}

/* ── HELPERS ── */
function pf(v){var n=parseFloat(String(v||"").trim());return isNaN(n)?null:n;}
function pi(v){var n=parseInt(String(v||"").trim(),10);return isNaN(n)?null:n;}
function prog(roll){return String(roll||"").toUpperCase().startsWith("IPM")?"IPM":"PGP";}

function gc(g){
  if(!g||!String(g).trim())return '<span style="color:var(--muted)">—</span>';
  var s=String(g).trim(),cl="g"+s.replace("+","p").replace("-","m");
  return '<span class="gc '+cl+'">'+s+"</span>";
}
function rb(r){
  var n=pi(r);if(n===null)return "—";
  if(n===1)return '<span class="rb r1">1</span>';
  if(n===2)return '<span class="rb r2">2</span>';
  if(n===3)return '<span class="rb r3">3</span>';
  return '<span class="rb ro">'+n+"</span>";
}
function photoCell(roll,name){
  var url=photos[roll];
  var ini=(name||roll||"?").split(" ").map(function(w){return w[0]||"";}).join("").slice(0,2).toUpperCase();
  if(url)return '<img class="sphoto" src="'+url+'" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'inline-flex\'">'
              +'<div class="sphoto-fb" style="display:none">'+ini+"</div>";
  return '<div class="sphoto-fb">'+ini+"</div>";
}

/* ── CSV PARSER ── */
function parseCSV(txt){
  var rows=[],cur=[],f="",q=false;
  for(var i=0;i<txt.length;i++){
    var c=txt[i],nx=txt[i+1];
    if(q){if(c==='"'&&nx==='"'){f+='"';i++;}else if(c==='"'){q=false;}else f+=c;}
    else{if(c==='"'){q=true;}else if(c===','){cur.push(f);f="";}
    else if(c==='\r'&&nx==='\n'){cur.push(f);rows.push(cur);cur=[];f="";i++;}
    else if(c==='\n'||c==='\r'){cur.push(f);rows.push(cur);cur=[];f="";}
    else f+=c;}
  }
  if(f||cur.length){cur.push(f);rows.push(cur);}
  return rows.filter(function(r){return r.some(function(c){return c.trim();});});
}

/* ── LOAD DATA ── */
var _debugLines=[];
function dbgLog(msg){_debugLines.push(msg);var el=document.getElementById("dbg");if(el)el.textContent=_debugLines.join("\n");}

async function loadData(){
  _debugLines=[];
  try{
    dbgLog("Fetching: "+CSV_URL);
    var r=await fetch(CSV_URL,{cache:"no-store"});
    dbgLog("HTTP status: "+r.status);
    if(!r.ok)throw new Error("HTTP "+r.status+" — check sheet is published (File → Share → Publish to web → CSV)");
    var txt=await r.text();
    dbgLog("Raw bytes received: "+txt.length);
    if(txt.length<50)throw new Error("Response too short ("+txt.length+" bytes) — sheet may not be published yet");

    var rows=parseCSV(txt);
    dbgLog("CSV rows parsed: "+rows.length);
    if(rows.length<2)throw new Error("Only "+rows.length+" row(s) found — need at least a header + 1 data row");

    // Show first row for debugging
    dbgLog("Row 0 (first 8 cols): "+rows[0].slice(0,8).map(function(v,i){return i+"=«"+v+"»";}).join(" | "));
    dbgLog("Row 1 (first 8 cols): "+rows[1].slice(0,8).map(function(v,i){return i+"=«"+v+"»";}).join(" | "));
    if(rows[2])dbgLog("Row 2 (first 8 cols): "+rows[2].slice(0,8).map(function(v,i){return i+"=«"+v+"»";}).join(" | "));

    // Auto-detect header row: find first row where col 12 area starts looking like marks
    // Default: row 0 is header, data starts at row 1
    var dataStartIdx=1;
    // If row 0 col 0 looks like a roll number (not blank, not "Roll"), maybe no header
    var r0c0=String(rows[0][0]||"").trim();
    var looksLikeHeader=r0c0===""||/roll|name|sno|s\.no|sr/i.test(r0c0)||isNaN(parseFloat(r0c0));
    dbgLog("Row 0 col 0: «"+r0c0+"» → looksLikeHeader: "+looksLikeHeader);

    var dataRows=rows.slice(looksLikeHeader?1:0);
    dbgLog("Data rows before filter: "+dataRows.length);

    // Pad and clean all rows
    allRows=dataRows.map(function(row){
      while(row.length<=C.ORANK)row.push("");
      return row.map(function(c){return String(c).trim();});
    }).filter(function(row){
      // Keep row if ANY of the first 5 cols has content
      return row.slice(0,5).some(function(v){return v!=="";});
    });

    dbgLog("allRows after filter: "+allRows.length);
    if(allRows.length>0){
      dbgLog("First student col map check:");
      dbgLog("  Roll[0]=«"+allRows[0][0]+"» Name[1]=«"+allRows[0][1]+"» Sec[2]=«"+allRows[0][2]+"»");
      dbgLog("  Marks[12-20]: "+allRows[0].slice(12,21).join(", "));
      dbgLog("  Ranks[30-38]: "+allRows[0].slice(30,39).join(", "));
      dbgLog("  Grades[39-47]: "+allRows[0].slice(39,48).join(", "));
      dbgLog("  TG[48]=«"+allRows[0][48]+"» T3R[49]=«"+allRows[0][49]+"» CG[51]=«"+allRows[0][51]+"» OvRank[52]=«"+allRows[0][52]+"»");
    }

    if(allRows.length===0)throw new Error("No student rows survived filtering — open DBG panel to see raw data");

    // Admin comment from row 0 col BC (54) — if header exists
    if(looksLikeHeader){
      var headerRow=rows[0]||[];
      var commentCell=(headerRow[C.COMMENT]||"").trim();
      var cbox=document.getElementById("cbox");
      if(commentCell){
        document.getElementById("cbox-text").textContent=commentCell;
        cbox.classList.add("show");
      } else {
        cbox.classList.remove("show");
      }
    }

    document.getElementById("upd").textContent="Updated "+new Date().toLocaleTimeString();
    document.getElementById("ebar").style.display="none";

  }catch(e){
    dbgLog("ERROR: "+e.message);
    document.getElementById("ebar").style.display="block";
    document.getElementById("emsg").innerHTML=e.message
      +' — <a href="#" onclick="toggleDbg();return false;" style="color:var(--red);text-decoration:underline">Open DBG panel</a> to see raw CSV data';
  }
}

async function loadPhotos(){
  try{
    var r=await fetch(API,{cache:"no-store"});if(!r.ok)return;
    var j=await r.json();
    if(j.status==="ok"&&j.data&&j.data.photos)photos=j.data.photos||{};
  }catch(e){}
}

async function doRefresh(){
  toast("Refreshing…");
  await Promise.all([loadData(),loadPhotos()]);
  applyF();toast("Refreshed ✓");
}

/* ── STATS ── */
function renderStats(rows){
  var tgv=rows.map(function(r){return pf(r[C.TG]);}).filter(function(v){return v!==null;});
  var cgv=rows.map(function(r){return pf(r[C.CG]);}).filter(function(v){return v!==null;});
  var avgTG=tgv.length?(tgv.reduce(function(a,b){return a+b;},0)/tgv.length).toFixed(2):"—";
  var topTG=tgv.length?Math.max.apply(null,tgv):"—";
  var avgCG=cgv.length?(cgv.reduce(function(a,b){return a+b;},0)/cgv.length).toFixed(2):"—";
  var pgp=rows.filter(function(r){return prog(r[0])==="PGP";}).length;
  var ipm=rows.filter(function(r){return prog(r[0])==="IPM";}).length;
  document.getElementById("stats").innerHTML=[
    {n:rows.length,l:"Students"},
    {n:avgTG,l:"Avg TG (T3)"},
    {n:topTG,l:"Highest TG"},
    {n:avgCG,l:"Avg CG (T3)"},
    {n:pgp,l:"PGP"},
    {n:ipm,l:"IPM"}
  ].map(function(x){return'<div class="sc"><div class="sc-n">'+x.n+'</div><div class="sc-l">'+x.l+"</div></div>";}).join("");
}

/* ── SORT ── */
function doSort(rows){
  return rows.slice().sort(function(a,b){
    if(sk==="name")return sd*(a[1]||"").toLowerCase().localeCompare((b[1]||"").toLowerCase());
    if(sk==="roll")return sd*(a[0]||"").toLowerCase().localeCompare((b[0]||"").toLowerCase());
    if(sk==="tg"){var va=pf(a[C.TG])||0,vb=pf(b[C.TG])||0;return sd*(vb-va);}
    if(sk==="cg"){var va=pf(a[C.CG])||0,vb=pf(b[C.CG])||0;return sd*(vb-va);}
    if(sk==="t3r"){var va=pi(a[C.T3R])||99999,vb=pi(b[C.T3R])||99999;return va-vb;}
    if(sk==="ovr"){var va=pi(a[C.ORANK])||99999,vb=pi(b[C.ORANK])||99999;return va-vb;}
    var mi=parseInt(sk.replace("m",""),10);
    if(!isNaN(mi)){var va=pf(a[C.TOT+mi])||0,vb=pf(b[C.TOT+mi])||0;return sd*(vb-va);}
    return 0;
  });
}

/* ── FILTER ── */
function applyF(){
  var q=document.getElementById("fq").value.toLowerCase().trim();
  var pr=document.getElementById("fprog").value;
  var sec=document.getElementById("fsec").value.toUpperCase();
  var sb=document.getElementById("fsortby").value||"ovr";
  var tmin=pf(document.getElementById("ftmin").value);
  var tmax=pf(document.getElementById("ftmax").value);
  var rmax=pi(document.getElementById("frnk").value);
  sk=sb;sd=1;
  filtered=allRows.filter(function(row){
    if(q&&!row[0].toLowerCase().includes(q)&&!row[1].toLowerCase().includes(q))return false;
    if(pr&&prog(row[0])!==pr)return false;
    if(sec&&row[2].toUpperCase()!==sec)return false;
    var tg=pf(row[C.TG]);
    if(tmin!==null&&tg!==null&&tg<tmin)return false;
    if(tmax!==null&&tg!==null&&tg>tmax)return false;
    if(rmax!==null){var rk=pi(row[C.ORANK]);if(rk!==null&&rk>rmax)return false;}
    return true;
  });
  filtered=doSort(filtered);
  buildHeaders();renderTable(filtered);renderStats(filtered);
}
function resetF(){
  ["fq","ftmin","ftmax","frnk"].forEach(function(id){document.getElementById(id).value="";});
  ["fprog","fsec"].forEach(function(id){document.getElementById(id).value="";});
  document.getElementById("fsortby").value="ovr";
  sk="ovr";sd=1;filtered=[...allRows];buildHeaders();renderTable(filtered);renderStats(filtered);
}

/* ── VIEW TOGGLE ── */
function swView(v,el){
  curView=v;
  document.querySelectorAll("#vseg .sb").forEach(function(b){b.classList.remove("on");});el.classList.add("on");
  var t={marks:"Term 3 — Marks",grades:"Term 3 — Grades",ranks:"Term 3 — Subject Ranks"};
  document.getElementById("ttitle").textContent=t[v];
  buildHeaders();renderTable(filtered);
}

/* ── HEADER CLICK SORT ── */
function hdrSort(k,th){
  if(sk===k)sd*=-1;else{sk=k;sd=1;}
  document.querySelectorAll("thead th").forEach(function(t){t.classList.remove("son");t.removeAttribute("data-d");});
  th.classList.add("son");th.setAttribute("data-d",sd===1?"▲":"▼");
  filtered=doSort(filtered);renderTable(filtered);
}

/* ── HEADERS ── */
function buildHeaders(){
  var lbl=curView==="marks"?"Total":curView==="grades"?"Grade":"Rank";
  document.getElementById("thead").innerHTML="<tr>"+
    '<th onclick="hdrSort(\'ovr\',this)" title="Year 1 Overall Rank">Ovr&nbsp;Rank</th>'+
    '<th style="cursor:default">Photo</th>'+
    '<th onclick="hdrSort(\'roll\',this)">Roll No</th>'+
    '<th onclick="hdrSort(\'name\',this)">Name</th>'+
    '<th style="cursor:default">Prog</th>'+
    '<th style="cursor:default">Sec</th>'+
    SUBJECTS.map(function(s,i){
      return '<th onclick="hdrSort(\'m'+i+'\',this)">'+s+'<br><small style="font-size:.5rem;color:var(--light);text-transform:none;letter-spacing:0;font-weight:400">'+lbl+'</small></th>';
    }).join("")+
    '<th onclick="hdrSort(\'tg\',this)">TG<br><small style="font-size:.5rem;color:var(--light);text-transform:none;letter-spacing:0;font-weight:400">T3</small></th>'+
    '<th onclick="hdrSort(\'t3r\',this)">T3&nbsp;Rank</th>'+
    '<th onclick="hdrSort(\'cg\',this)">CG<br><small style="font-size:.5rem;color:var(--light);text-transform:none;letter-spacing:0;font-weight:400">T3</small></th>'+
    '</tr>';
}

/* ── RENDER TABLE ── */
function renderTable(rows){
  var n=rows.length;
  document.getElementById("tcnt").textContent=n+" student"+(n!==1?"s":"");
  document.getElementById("nores").style.display=n===0?"block":"none";

  document.getElementById("tbody").innerHTML=rows.map(function(row){
    var roll=row[0],name=row[1],sec=row[2],pr=prog(roll);
    var tg=row[C.TG],t3r=row[C.T3R],cg=row[C.CG],orank=row[C.ORANK];
    var subjCells=SUBJECTS.map(function(s,i){
      if(curView==="marks"){
        var v=pf(row[C.TOT+i]);
        return '<td class="mc">'+(v!==null?v:"—")+"</td>";
      }
      if(curView==="grades") return "<td>"+gc(row[C.GRD+i])+"</td>";
      return '<td style="text-align:center">'+rb(row[C.RANK+i])+"</td>";
    }).join("");

    return "<tr>"+
      '<td style="text-align:center">'+rb(orank)+"</td>"+
      '<td style="text-align:center">'+photoCell(roll,name)+"</td>"+
      '<td class="rc">'+roll+"</td>"+
      '<td class="nc">'+name+"</td>"+
      '<td><span class="badge '+(pr==="IPM"?"bipm":"bpgp")+'">'+pr+"</span></td>"+
      '<td><span class="badge bsec">'+sec+"</span></td>"+
      subjCells+
      '<td class="tgc">'+(tg||"—")+"</td>"+
      '<td style="text-align:center">'+rb(t3r)+"</td>"+
      '<td class="cgc">'+(cg||"—")+"</td>"+
      "</tr>";
  }).join("");
}

/* ── DEBUG TOGGLE ── */
function toggleDbg(){
  var el=document.getElementById("dbg");
  el.classList.toggle("show");
  if(el.classList.contains("show"))el.textContent=_debugLines.join("\n");
}

/* ── INIT ── */
function initApp(){
  filtered=[...allRows];
  buildHeaders();renderTable(filtered);renderStats(filtered);
}

/* ── BOOT ── */
document.addEventListener("DOMContentLoaded",function(){
  // Apply saved theme to button immediately
  var isDark=document.documentElement.getAttribute("data-theme")==="dark";
  document.getElementById("tbtn").innerHTML=isDark?"&#9728;":"&#9790;";

  // Show app immediately — no loading screen
  initApp(); // renders skeleton (empty rows)

  // Load data in background and refresh table
  Promise.all([loadData(),loadPhotos()]).then(function(){
    initApp();
  });
});

function toast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("on");setTimeout(function(){t.classList.remove("on");},2600);}
</script>
